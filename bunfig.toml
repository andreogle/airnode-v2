[install]
# Supply-chain hardening: refuse to install any package version published less
# than 3 days ago, so a freshly-published malicious release can't be pulled in
# before it's caught and yanked. 3 days = 259200 seconds.
minimumReleaseAge = 259200

[test]
root = "src"
coverageSkipTestFiles = true
# Bun applies detailed thresholds per source file. These floors match the
# currently least-covered production modules and now fail on regressions.
coverageThreshold = { lines = 0.92, functions = 0.88 }
# Example plugins and generated temporary plugin fixtures are integration
# surfaces, not production runtime modules.
coveragePathIgnorePatterns = ["examples/**", "/tmp/**"]
