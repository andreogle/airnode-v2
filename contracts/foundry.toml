[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "prague"
optimizer_runs = 200
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }

[lint]
exclude_lints = ["mixed-case-function", "mixed-case-variable"]

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 1024, depth = 128 }
