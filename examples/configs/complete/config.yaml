version: '1.0'

server:
  port: 3000
  host: '0.0.0.0'
  cors:
    origins:
      - '*'
  rateLimit:
    window: 60000
    max: 100

settings:
  timeout: 15000
  proof: none
  plugins:
    - source: ../../plugins/heartbeat.ts
      timeout: 5000

apis:
  - name: CoinGecko
    url: http://localhost:5123
    timeout: 15000
    headers:
      x-cg-pro-api-key: ${COINGECKO_API_KEY}
    auth:
      type: apiKey
      keys:
        - ${CLIENT_API_KEY}
    cache:
      maxAge: 30000
    endpoints:
      - name: coinPrice
        path: /simple/price
        method: GET
        parameters:
          - name: ids
            in: query
            required: true
            description: Coin ID (e.g. ethereum, bitcoin)
          - name: vs_currencies
            in: query
            default: usd
        encoding:
          type: int256
          path: $.ethereum.usd
          times: '1e18'
        cache:
          maxAge: 30000
          delay: 60000 # public responses delayed by 60s (OEV window)
        description: Get the current price of a coin

      - name: coinMarketData
        path: /coins/{coinId}
        method: GET
        parameters:
          - name: coinId
            in: path
            required: true
          - name: localization
            in: query
            fixed: 'false'
          - name: tickers
            in: query
            fixed: 'false'
        encoding:
          type: int256
          path: $.market_data.current_price.usd
          times: '1e18'
        auth: # endpoint-level override
          type: apiKey
          keys:
            - ${CLIENT_API_KEY}

      - name: coinPriceMulti
        path: /simple/price
        method: GET
        parameters:
          - name: ids
            in: query
            required: true
          - name: vs_currencies
            in: query
            fixed: usd
          - name: include_24hr_vol
            in: query
            fixed: 'true'
        encoding:
          type: int256,uint256
          path: $.ethereum.usd,$.ethereum.usd_24h_vol
          times: '1e18,1e18'
        description: Get price and 24h volume in a single response

      - name: coinPriceRaw
        path: /simple/price
        method: GET
        parameters:
          - name: ids
            in: query
            required: true
          - name: vs_currencies
            in: query
            required: true
        description: Raw JSON response — no ABI encoding

  - name: WeatherAPI
    url: http://localhost:5123
    headers:
      x-weather-key: ${WEATHER_API_KEY}
    auth:
      type: free
    endpoints:
      - name: currentTemp
        path: /current.json
        method: GET
        parameters:
          - name: q
            in: query
            required: true
            description: Location query (city name, lat/lon, IP, etc.)
        encoding:
          type: int256
          path: $.current.temp_c
          times: '100'

  - name: RandomAPI
    url: http://localhost:5123
    timeout: 30000
    headers:
      Authorization: Bearer ${RANDOM_ORG_TOKEN}
      Content-Type: application/json
    endpoints:
      - name: generateInteger
        path: /json-rpc/4/invoke
        method: POST
        parameters:
          - name: jsonrpc
            in: body
            fixed: '2.0'
          - name: method
            in: body
            fixed: generateIntegers
          - name: min
            in: body
            default: 0
          - name: max
            in: body
            default: 100
        encoding:
          type: uint256
          path: $.result.random.data[0]
