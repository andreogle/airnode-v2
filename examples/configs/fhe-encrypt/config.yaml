version: '1.0'

server:
  port: 3000

settings:
  proof: none
  plugins:
    - source: ../../plugins/fhe-encrypt/dist/index.js
      timeout: 30000

apis:
  - name: CoinGecko
    url: https://api.coingecko.com/api/v3
    endpoints:
      - name: coinPrice
        path: /simple/price
        method: GET
        parameters:
          - name: ids
            in: query
            required: true
            description: Coin ID (e.g. ethereum, bitcoin)
          - name: vs_currencies
            in: query
            default: usd
        encoding:
          type: int256
          path: $.ethereum.usd
          times: '1e18'
        description: >
          Encrypted coin price. The fhe-encrypt plugin encrypts the ABI-encoded
          value with the chain's FHE public key before signing. The response
          contains ciphertext that can be submitted to an fhEVM-compatible chain.
