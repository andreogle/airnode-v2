version: '1.0'

server:
  port: 3000
  rateLimit:
    window: 60000
    max: 100
    x402:
      window: 60000
      max: 30

settings:
  maxConcurrentApiCalls: 50
  proof: none
  # FHE relayer connection. With `fhe` configured, any endpoint that has an
  # `encrypt` block gets its ABI-encoded value replaced with an FHE ciphertext
  # before signing. `rpcUrl` is the Ethereum JSON-RPC endpoint for the fhEVM
  # chain — use `${FHE_RPC_URL}` and a .env entry if your endpoint embeds a key.
  # `verifier` is the AirnodeVerifier deployment on that chain: the encrypted
  # input is bound to it (it's the address that calls the consumer's callback).
  # Replace the placeholder below with your AirnodeVerifier address.
  fhe:
    network: sepolia
    rpcUrl: https://ethereum-sepolia-rpc.publicnode.com
    verifier: '0x0000000000000000000000000000000000000000'

apis:
  - name: CoinGecko
    url: https://api.coingecko.com/api/v3
    endpoints:
      - name: coinPrice
        path: /simple/price
        method: GET
        parameters:
          - name: ids
            in: query
            required: true
            description: Coin ID (e.g. ethereum, bitcoin)
          - name: vs_currencies
            in: query
            default: usd
        encoding:
          type: int256
          path: $.ethereum.usd
          times: '1e18'
        # Encrypt the encoded price with the chain's FHE public key before
        # signing. The signed `data` becomes abi.encode(bytes32 handle, bytes
        # inputProof), bound to the consumer contract below. Replace `contract`
        # with your deployed ConfidentialPriceFeed address.
        encrypt:
          type: euint256
          contract: '0x5FbDB2315678afecb367f032d93F642f64180aa3'
        description: >
          Encrypted ETH/USD price. The encoded value is FHE-encrypted before
          signing; the response carries ciphertext that can be submitted to an
          fhEVM-compatible chain where contracts compute on it without
          decrypting.
